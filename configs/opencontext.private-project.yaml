project:
  name: "private-project"

security:
  mode: "private_project"
  fail_closed: true
  default_classification: "internal"
  external_providers_enabled: false

providers:
  external_enabled: false

tools:
  native:
    enabled: false
  mcp:
    enabled: false

memory:
  enabled: true
  harvest_after_run: false
  require_approval: true
  store_raw: false

output:
  mode: "concise"
  max_output_tokens: 1500
