<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 318" width="720" height="318" role="img" aria-label="Five harness tracks: quick (explore→apply→verify), standard (explore→spec+design→apply→verify), full (all 9 phases), autonomous (all 9, no prompts), quality (all 9 + GGA rules + judgment).">
  <rect width="720" height="318" rx="8" fill="#0B0F14"/>

  <text x="30" y="24" font-size="11" fill="#606978" letter-spacing="1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">HARNESS TRACKS</text>

  <!-- Header -->
  <text x="30" y="46" font-size="11" fill="#606978" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">TRACK</text>
  <text x="146" y="46" font-size="11" fill="#606978" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">PHASES</text>
  <text x="558" y="46" font-size="11" fill="#606978" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">WHEN</text>

  <!-- Row 1: quick -->
  <rect x="30" y="56" width="106" height="30" rx="15" fill="#0D2220" stroke="#2DC4A4" stroke-width="1"/>
  <text x="83" y="75" text-anchor="middle" font-size="13" fill="#2DC4A4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">quick</text>
  <text x="146" y="75" font-size="13" fill="#E6EDF3" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">explore → apply → verify</text>
  <text x="558" y="75" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Simple fixes</text>
  <line x1="30" y1="96" x2="690" y2="96" stroke="#21262D" stroke-width="0.5"/>

  <!-- Row 2: standard -->
  <rect x="30" y="104" width="106" height="30" rx="15" fill="#0D1A28" stroke="#35ADE5" stroke-width="1"/>
  <text x="83" y="123" text-anchor="middle" font-size="13" fill="#35ADE5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">standard</text>
  <text x="146" y="123" font-size="13" fill="#E6EDF3" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">explore → spec + design → apply → verify</text>
  <text x="558" y="123" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Features, refactors</text>
  <line x1="30" y1="144" x2="690" y2="144" stroke="#21262D" stroke-width="0.5"/>

  <!-- Row 3: full -->
  <rect x="30" y="152" width="106" height="30" rx="15" fill="#12101C" stroke="#8A6BBF" stroke-width="1"/>
  <text x="83" y="171" text-anchor="middle" font-size="13" fill="#8A6BBF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">full</text>
  <text x="146" y="171" font-size="12" fill="#E6EDF3" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">all 9 phases · sequential</text>
  <text x="558" y="171" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Architecture, security</text>
  <line x1="30" y1="192" x2="690" y2="192" stroke="#21262D" stroke-width="0.5"/>

  <!-- Row 4: autonomous -->
  <rect x="30" y="200" width="106" height="30" rx="15" fill="#1E1600" stroke="#D4A840" stroke-width="1"/>
  <text x="83" y="219" text-anchor="middle" font-size="12" fill="#D4A840" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">autonomous</text>
  <text x="146" y="219" font-size="13" fill="#E6EDF3" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">all 9 phases · no human prompts</text>
  <text x="558" y="219" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">CI / automation</text>
  <line x1="30" y1="240" x2="690" y2="240" stroke="#21262D" stroke-width="0.5"/>

  <!-- Row 5: quality -->
  <rect x="30" y="248" width="106" height="30" rx="15" fill="#1E1010" stroke="#E8706A" stroke-width="1"/>
  <text x="83" y="267" text-anchor="middle" font-size="13" fill="#E8706A" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">quality</text>
  <text x="146" y="267" font-size="13" fill="#E6EDF3" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">all 9 phases · GGA rules · judgment</text>
  <text x="558" y="267" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Maximum quality</text>
  <line x1="30" y1="288" x2="690" y2="288" stroke="#21262D" stroke-width="0.5"/>

  <!-- Legend -->
  <text x="30" y="308" font-size="11" fill="#606978" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Run: </text>
  <text x="56" y="308" font-size="11" fill="#9DA6B0" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">opencontext harness run --track &lt;name&gt;</text>
</svg>
