<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 208" width="720" height="208" role="img" aria-label="Three OC personas: OC Orchestrator coordinates SDD phases, OC Professor explains concepts from the code graph, OC Reviewer runs code review, GGA gates, and judgment-day checks.">
  <rect width="720" height="208" rx="8" fill="#0B0F14"/>

  <text x="20" y="22" font-size="11" fill="#606978" letter-spacing="1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">OC PERSONAS</text>

  <!-- Card 1: Orchestrator -->
  <rect x="20" y="32" width="220" height="156" rx="6" fill="#0D1218" stroke="#35ADE5" stroke-width="1"/>
  <text x="130" y="58" text-anchor="middle" font-size="11" letter-spacing="1" fill="#35ADE5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">ORCHESTRATOR</text>
  <text x="130" y="84" text-anchor="middle" font-size="17" font-weight="bold" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">OC Orchestrator</text>
  <text x="130" y="108" text-anchor="middle" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Plans and delegates.</text>
  <text x="130" y="126" text-anchor="middle" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Coordinates SDD end to end.</text>
  <rect x="86" y="148" width="88" height="22" rx="11" fill="#04111E" stroke="#35ADE5" stroke-width="1"/>
  <text x="130" y="163" text-anchor="middle" font-size="11" fill="#35ADE5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">multi-agent</text>

  <!-- Card 2: Professor -->
  <rect x="250" y="32" width="220" height="156" rx="6" fill="#12101C" stroke="#8A6BBF" stroke-width="1"/>
  <text x="360" y="58" text-anchor="middle" font-size="11" letter-spacing="1" fill="#8A6BBF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">PROFESSOR</text>
  <text x="360" y="84" text-anchor="middle" font-size="17" font-weight="bold" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">OC Professor</text>
  <text x="360" y="108" text-anchor="middle" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Explains the why before</text>
  <text x="360" y="126" text-anchor="middle" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">the code. Teaching mentor.</text>
  <rect x="320" y="148" width="80" height="22" rx="11" fill="#0E0816" stroke="#8A6BBF" stroke-width="1"/>
  <text x="360" y="163" text-anchor="middle" font-size="11" fill="#8A6BBF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">teaching</text>

  <!-- Card 3: Reviewer -->
  <rect x="480" y="32" width="220" height="156" rx="6" fill="#061410" stroke="#2DC4A4" stroke-width="1"/>
  <text x="590" y="58" text-anchor="middle" font-size="11" letter-spacing="1" fill="#2DC4A4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">REVIEWER</text>
  <text x="590" y="84" text-anchor="middle" font-size="17" font-weight="bold" fill="#E6EDF3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">OC Reviewer</text>
  <text x="590" y="108" text-anchor="middle" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Code review, GGA gates,</text>
  <text x="590" y="126" text-anchor="middle" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">and judgment-day review.</text>
  <rect x="544" y="148" width="92" height="22" rx="11" fill="#041410" stroke="#2DC4A4" stroke-width="1"/>
  <text x="590" y="163" text-anchor="middle" font-size="11" fill="#2DC4A4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">verification</text>
</svg>
