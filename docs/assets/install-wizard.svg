<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" width="720" height="700" role="img" aria-label="opencontext install wizard: template, security mode, TDD mode, and AI coding agents">

  <rect width="720" height="700" rx="10" fill="#0B0F14"/>

  <!-- Title bar — plain terminal style, no OS circles -->
  <rect width="720" height="40" rx="10" fill="#111821"/>
  <rect y="30" width="720" height="10" fill="#111821"/>
  <text x="20" y="25" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="12" fill="#2DC4A4">❯</text>
  <text x="360" y="25" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif"
        font-size="12" fill="#606978">opencontext — ~/projects/my-app</text>

  <!-- ── 0: shell prompt ── appear at 3% -->
  <text x="20" y="62" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#2DC4A4">~/my-app</tspan><tspan fill="#606978"> on </tspan><tspan fill="#35ADE5">main</tspan><tspan fill="#2DC4A4"> ✓</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.03;0.05;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- ── 1: command ── appear at 6% -->
  <text x="20" y="80" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">❯</tspan><tspan fill="#E6EDF3"> opencontext install</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.06;0.08;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- ── 2: detected stack ── appear at 10% -->
  <text x="20" y="104" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#606978">  Detected  </tspan><tspan fill="#2DC4A4">Python 3.12</tspan><tspan fill="#606978"> · </tspan><tspan fill="#2DC4A4">FastAPI</tspan><tspan fill="#606978"> · </tspan><tspan fill="#2DC4A4">pytest</tspan><tspan fill="#606978"> · </tspan><tspan fill="#2DC4A4">git</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.10;0.12;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- divider 1 ── 14% -->
  <line x1="20" y1="116" x2="700" y2="116" stroke="#21262D" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.16;0.94;1" dur="20s" repeatCount="indefinite"/>
  </line>

  <!-- ── STEP 1: template question ── 16% -->
  <text x="20" y="134" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="11" fill="#35ADE5" opacity="0">── Step 1 / 4 — Configuration Template ──────────────────────────────<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.16;0.17;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="20" y="154" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">?</tspan><tspan fill="#E6EDF3"> Choose a configuration template</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.17;0.19;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- step 1 options ── 19% -->
  <rect x="20" y="162" width="680" height="20" rx="2" fill="#0D1A28" stroke="rgba(53,173,229,0.30)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.19;0.21;0.94;1" dur="20s" repeatCount="indefinite"/>
  </rect>
  <text x="28" y="176" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">❯ </tspan><tspan fill="#E6EDF3">Generic (default)  </tspan><tspan fill="#606978">— Standard project, recommended for most users</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.19;0.21;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>
  <text x="28" y="196" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  Enterprise         — Strict security, all external providers blocked<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.21;0.22;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="214" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  Air-gapped         — No external access, no semantic cache, max isolation<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.23;0.94;1" dur="20s" repeatCount="indefinite"/></text>

  <!-- divider 2 ── 28% -->
  <line x1="20" y1="226" x2="700" y2="226" stroke="#21262D" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.28;0.30;0.94;1" dur="20s" repeatCount="indefinite"/>
  </line>

  <!-- ── STEP 2: security mode ── 30% -->
  <text x="20" y="244" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="11" fill="#35ADE5" opacity="0">── Step 2 / 4 — Security Mode ───────────────────────────────────────<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.30;0.31;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="20" y="264" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">?</tspan><tspan fill="#E6EDF3"> Choose security mode</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.31;0.33;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- step 2 options ── 33% -->
  <rect x="20" y="272" width="680" height="20" rx="2" fill="#0D1A28" stroke="rgba(53,173,229,0.30)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.33;0.35;0.94;1" dur="20s" repeatCount="indefinite"/>
  </rect>
  <text x="28" y="286" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">❯ </tspan><tspan fill="#E6EDF3">private_project  </tspan><tspan fill="#606978">— Redaction on, external providers off (recommended)</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.33;0.35;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>
  <text x="28" y="306" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  developer        — Local dev posture, fewest restrictions<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.36;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="322" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  enterprise       — Team sharing with governance<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.36;0.37;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="338" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  air_gapped       — Completely offline, no external access<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.37;0.38;0.94;1" dur="20s" repeatCount="indefinite"/></text>

  <!-- divider 3 ── 44% -->
  <line x1="20" y1="350" x2="700" y2="350" stroke="#21262D" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.44;0.46;0.94;1" dur="20s" repeatCount="indefinite"/>
  </line>

  <!-- ── STEP 3: TDD mode ── 46% -->
  <text x="20" y="368" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="11" fill="#35ADE5" opacity="0">── Step 3 / 4 — TDD Mode ────────────────────────────────────────────<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.46;0.47;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="20" y="388" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">?</tspan><tspan fill="#E6EDF3"> Choose TDD mode</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.47;0.49;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- step 3 options ── 49% -->
  <rect x="20" y="396" width="680" height="20" rx="2" fill="#0D1A28" stroke="rgba(53,173,229,0.30)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.51;0.94;1" dur="20s" repeatCount="indefinite"/>
  </rect>
  <text x="28" y="410" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">❯ </tspan><tspan fill="#E6EDF3">Ask me   </tspan><tspan fill="#606978">— Prompt before each TDD decision (default)</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.51;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>
  <text x="28" y="428" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  Strict   — Always require a failing test before production code<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.51;0.52;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="444" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">  Off      — No TDD enforcement, code-first workflow<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.52;0.53;0.94;1" dur="20s" repeatCount="indefinite"/></text>

  <!-- divider 4 ── 58% -->
  <line x1="20" y1="456" x2="700" y2="456" stroke="#21262D" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.58;0.60;0.94;1" dur="20s" repeatCount="indefinite"/>
  </line>

  <!-- ── STEP 4: agents checkbox ── 60% -->
  <text x="20" y="474" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="11" fill="#35ADE5" opacity="0">── Step 4 / 4 — AI Coding Agents ────────────────────────────────────<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.60;0.61;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="20" y="494" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">?</tspan><tspan fill="#E6EDF3"> Select agents to configure  </tspan><tspan fill="#606978">(Space to select/deselect, Enter to confirm.)</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.61;0.63;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- step 4 options (appear staggered) ── 63%+ -->
  <rect x="20" y="502" width="680" height="20" rx="2" fill="#0D1A28" stroke="rgba(53,173,229,0.30)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.63;0.65;0.94;1" dur="20s" repeatCount="indefinite"/>
  </rect>
  <text x="28" y="516" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#35ADE5">❯ </tspan><tspan fill="#2DC4A4">◉ </tspan><tspan fill="#E6EDF3">OpenCode      </tspan><tspan fill="#606978">— opencode.ai (Tab personas, MCP)</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.63;0.65;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>
  <text x="28" y="534" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Claude Code   — Anthropic CLI (.claude/agents)<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.66;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="550" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Cursor        — .cursor/mcp.json<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.66;0.67;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="566" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Windsurf      — .windsurf/mcp.json<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.67;0.68;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="582" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Kilo Code     — VS Code extension<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.68;0.69;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="598" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Gemini CLI    — Google AI CLI<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.69;0.70;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="614" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Codex         — OpenAI Codex CLI<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.70;0.71;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="630" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Aider         — aider.chat CLI<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.72;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="646" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Cline         — VS Code Cline extension<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.73;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="662" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Roo           — Roo-Code extension<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.73;0.74;0.94;1" dur="20s" repeatCount="indefinite"/></text>
  <text x="28" y="678" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" fill="#606978" opacity="0">    ◯ Continue      — continue.dev extension<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.75;0.94;1" dur="20s" repeatCount="indefinite"/></text>

  <!-- ── Result: setup running ── 82% -->
  <text x="20" y="696" font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="13" opacity="0">
    <tspan fill="#606978">  Setting up project... </tspan><tspan fill="#2DC4A4">done  </tspan><tspan fill="#9DA6B0">opencode.md · claude-code.md installed</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.82;0.84;0.94;1" dur="20s" repeatCount="indefinite"/>
  </text>

  <!-- Progress bar ── 82% → fills to 90% -->
  <rect x="212" y="684" width="200" height="6" rx="3" fill="#21262D" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.82;0.84;0.94;1" dur="20s" repeatCount="indefinite"/>
  </rect>
  <rect x="212" y="684" width="0" height="6" rx="3" fill="#2DC4A4" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.82;0.84;0.94;1" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="width" values="0;0;0;200;200" keyTimes="0;0.82;0.84;0.90;1" dur="20s" repeatCount="indefinite"/>
  </rect>

  <!-- ── FADE OVERLAY between loops ── -->
  <rect width="720" height="700" rx="10" fill="#0B0F14" opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.93;0.95;0.98;1" dur="20s" repeatCount="indefinite"/>
  </rect>

</svg>
