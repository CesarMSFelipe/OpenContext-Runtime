<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" role="img" aria-label="Without OpenContext: agent grep+read loop, 4-8 rounds, whole files, no call graph. With OpenContext: one explain call, symbol-level, call graph traced, same result every run.">

  <rect width="720" height="240" rx="14" fill="#0B0F14"/>
  <rect x="1" y="1" width="718" height="238" rx="13" fill="none" stroke="rgba(0,201,167,0.15)" stroke-width="1"/>

  <!-- CENTER DIVIDER with arrow -->
  <line x1="360" y1="0" x2="360" y2="240" stroke="#21262D" stroke-width="1"/>
  <rect x="342" y="104" width="36" height="32" rx="8" fill="#0B0F14" stroke="#21262D" stroke-width="1"/>
  <text x="360" y="124" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" fill="#606978">→</text>

  <!-- ── LEFT PANEL ── -->
  <rect x="0" y="0" width="360" height="240" rx="14" fill="#111821"/>
  <rect x="361" y="0" width="1" height="240" fill="#21262D"/>

  <text x="180" y="28" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#E8706A" letter-spacing="0.9">AGENT TOOL LOOP</text>

  <g font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5" fill="#9DA6B0">
    <text x="18" y="52">grep "oauth2"  →  47 matches</text>
    <text x="18" y="70">read routing.py</text>
    <text x="140" y="82" font-size="10.5" fill="#E8706A">→ 56,550 tok (whole file)</text>
    <text x="18" y="100">read security/oauth2.py</text>
    <text x="168" y="112" font-size="10.5" fill="#E8706A">→  6,044 tok (whole file)</text>
    <text x="18" y="130">read security/http.py</text>
    <text x="150" y="142" font-size="10.5" fill="#E8706A">→  3,352 tok (whole file)</text>
    <text x="18" y="162" fill="#606978">HTTPBearer? Extra round needed.</text>
    <text x="18" y="178" fill="#606978">Test examples? Not found.</text>
  </g>

  <line x1="18" y1="192" x2="344" y2="192" stroke="#21262D" stroke-width="1"/>

  <text x="18" y="220"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="24" font-weight="700" fill="#E8706A">~65,000 tok</text>
  <text x="182" y="220"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">  ·  4–8 rounds  ·  no call graph</text>

  <!-- ── RIGHT PANEL ── -->
  <!-- Teal top glow -->
  <rect x="361" y="0" width="359" height="5" rx="0" fill="rgba(0,201,167,0.28)"/>
  <rect x="361" y="0" width="359" height="240" rx="0" fill="#111820"/>
  <rect x="715" y="0" width="5" height="240" rx="2" fill="#111820"/>

  <text x="540" y="28" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" font-weight="600" fill="#2DC4A4" letter-spacing="0.9">OPENCONTEXT EXPLAIN</text>

  <g font-family="'JetBrains Mono','Cascadia Code','SF Mono',Consolas,monospace" font-size="11.5">
    <text x="374" y="52" fill="#E6EDF3">opencontext explain "add OAuth2 auth"</text>
    <text x="374" y="72" fill="#35ADE5">security/oauth2.py:433 </text><text x="532" y="72" fill="#9DA6B0"> OAuth2PasswordBearer</text>
    <text x="374" y="90" fill="#35ADE5">security/oauth2.py:547 </text><text x="532" y="90" fill="#9DA6B0"> OAuth2AuthzCodeBearer</text>
    <text x="374" y="108" fill="#35ADE5">security/http.py:254   </text><text x="532" y="108" fill="#9DA6B0"> HTTPBearer</text>
    <text x="374" y="126" fill="#8A6BBF">test_security_oauth2_* </text><text x="532" y="126" fill="#8A6BBF"> usage examples ✓</text>
    <text x="374" y="146" fill="#606978">… 10 more  (symbol-level, ranked by call graph)</text>
  </g>

  <line x1="374" y1="164" x2="706" y2="164" stroke="#21262D" stroke-width="1"/>

  <!-- Right totals + pills -->
  <text x="374" y="196"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="24" font-weight="700" fill="#2DC4A4">11,740 tok</text>

  <rect x="494" y="178" width="82" height="26" rx="6" fill="rgba(0,201,167,0.12)" stroke="rgba(0,201,167,0.35)" stroke-width="1"/>
  <text x="535" y="195" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" font-weight="700" fill="#2DC4A4">82% less</text>

  <rect x="586" y="178" width="96" height="26" rx="6" fill="rgba(0,168,232,0.10)" stroke="rgba(0,168,232,0.28)" stroke-width="1"/>
  <text x="634" y="195" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11.5" font-weight="600" fill="#35ADE5">1 call</text>

  <text x="374" y="220"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#9DA6B0">call graph  ·  symbol-level  ·  same result every run</text>
  <text x="374" y="235"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#606978">tiangolo/fastapi — 1,121 py files</text>

</svg>
