<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" width="720" height="310" role="img" aria-label="Five local agent memory layers: semantic (code graph, long term), episodic (session observations), procedural (workflow rules), working (per-task scratchpad), failure (error patterns).">
  <rect width="720" height="310" rx="8" fill="#0B0F14"/>

  <text x="30" y="24" font-size="11" fill="#606978" letter-spacing="1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">LOCAL AGENT MEMORY</text>

  <!-- Bar 1: SEMANTIC -->
  <rect x="20" y="36" width="680" height="46" rx="5" fill="#0D1A28" stroke="#35ADE5" stroke-width="1"/>
  <text x="36" y="64" font-size="13" font-weight="bold" fill="#35ADE5" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">SEMANTIC</text>
  <text x="180" y="64" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Code graph · symbols · call relationships · long-term indexed knowledge</text>

  <!-- Bar 2: EPISODIC -->
  <rect x="20" y="90" width="680" height="46" rx="5" fill="#12101C" stroke="#8A6BBF" stroke-width="1"/>
  <text x="36" y="118" font-size="13" font-weight="bold" fill="#8A6BBF" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">EPISODIC</text>
  <text x="180" y="118" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Session observations · decisions made · bugs found this session</text>

  <!-- Bar 3: PROCEDURAL -->
  <rect x="20" y="144" width="680" height="46" rx="5" fill="#1E1600" stroke="#D4A840" stroke-width="1"/>
  <text x="36" y="172" font-size="13" font-weight="bold" fill="#D4A840" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">PROCEDURAL</text>
  <text x="180" y="172" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Workflow rules · conventions · patterns enforced across sessions</text>

  <!-- Bar 4: WORKING -->
  <rect x="20" y="198" width="680" height="46" rx="5" fill="#0D2220" stroke="#2DC4A4" stroke-width="1"/>
  <text x="36" y="226" font-size="13" font-weight="bold" fill="#2DC4A4" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">WORKING</text>
  <text x="180" y="226" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Per-task scratchpad · current plan · immediate context window</text>

  <!-- Bar 5: FAILURE -->
  <rect x="20" y="252" width="680" height="46" rx="5" fill="#1E1010" stroke="#E8706A" stroke-width="1"/>
  <text x="36" y="280" font-size="13" font-weight="bold" fill="#E8706A" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">FAILURE</text>
  <text x="180" y="280" font-size="13" fill="#9DA6B0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif">Error patterns · past mistakes · what not to repeat next time</text>
</svg>
