<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="Install OpenContext with pip, pipx, or uv; or use the shell script for Ubuntu/macOS, PowerShell for Windows, or build a portable binary with make binary." style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="720" height="160" fill="#0B0F14" rx="8"/>

  <text x="30" y="22" font-size="10" fill="#606978" letter-spacing="0.5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">INSTALLATION</text>

  <!-- Row 1, Card 1: pip / pipx / uv (x=20, y=34, w=220, h=52) -->
  <rect x="20" y="34" width="220" height="52" rx="5" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="130" y="56" font-size="11" font-weight="bold" fill="#E6EDF3" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">pip · pipx · uv</text>
  <text x="130" y="74" font-size="9" fill="#9DA6B0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Python package managers</text>

  <!-- Row 1, Card 2: Ubuntu / macOS (x=250, y=34, w=220, h=52) -->
  <rect x="250" y="34" width="220" height="52" rx="5" fill="#0D1A28" stroke="#35ADE5" stroke-width="1"/>
  <text x="360" y="56" font-size="11" font-weight="bold" fill="#35ADE5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Ubuntu · macOS</text>
  <text x="360" y="74" font-size="8.5" fill="#9DA6B0" text-anchor="middle" font-family="'Courier New',monospace">curl -fsSL install.sh | bash</text>

  <!-- Row 1, Card 3: Windows (x=480, y=34, w=220, h=52) -->
  <rect x="480" y="34" width="220" height="52" rx="5" fill="#12101C" stroke="#8A6BBF" stroke-width="1"/>
  <text x="590" y="56" font-size="11" font-weight="bold" fill="#8A6BBF" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Windows</text>
  <text x="590" y="74" font-size="8.5" fill="#9DA6B0" text-anchor="middle" font-family="'Courier New',monospace">irm install.ps1 | iex</text>

  <!-- Row 2, Card 4: pip install opencontext-cli (x=20, y=100, w=220, h=52) -->
  <rect x="20" y="100" width="220" height="52" rx="5" fill="#0D2220" stroke="#2DC4A4" stroke-width="1"/>
  <text x="130" y="122" font-size="9" font-weight="bold" fill="#2DC4A4" text-anchor="middle" font-family="'Courier New',monospace">pip install opencontext-cli</text>
  <text x="130" y="140" font-size="9" fill="#9DA6B0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Recommended · PyPI</text>

  <!-- Row 2, Card 5: uv tool install (x=250, y=100, w=220, h=52) -->
  <rect x="250" y="100" width="220" height="52" rx="5" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="360" y="122" font-size="8.5" fill="#E6EDF3" text-anchor="middle" font-family="'Courier New',monospace">uv tool install opencontext-cli</text>
  <text x="360" y="140" font-size="9" fill="#9DA6B0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Fastest install</text>

  <!-- Row 2, Card 6: Portable (x=480, y=100, w=220, h=52) -->
  <rect x="480" y="100" width="220" height="52" rx="5" fill="#111821" stroke="#21262D" stroke-width="1"/>
  <text x="590" y="122" font-size="11" font-weight="bold" fill="#E6EDF3" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">make binary</text>
  <text x="590" y="140" font-size="9" fill="#9DA6B0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">dist/opencontext.pyz</text>
</svg>
